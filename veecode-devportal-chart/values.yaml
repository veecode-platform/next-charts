global:
  # define external hostname
  host: devportal.localhost
  # define protocol (http or https)
  protocol: https
  # define port (leave empty for default, must start with ":" if not empty)
  port: ''
  # custom theme settings
  theme:
    # Theme file url (should be a valid url to a json file)
    downloadUrl: ""
    # custom theme json (may merge or replace)
    # customJson: |
    #   {
    #     "nop": "nop"
    #   }
    # Merge customJson with default theme ("false" will replace default theme)
    mergeJson: true
    # define favIcon url
    favIcon: ''
  dynamic:
    includes:
      - dynamic-plugins.default.yaml
      - extensions-install.yaml
    plugins: []
createClusterRoles:
  enabled: true
upstream:
  enabled: true
  fullnameOverride: veecode-devportal
  serviceAccount:
    create: true
    name: veecode-devportal-sa
  ingress:
    enabled: false
    host: '{{- include "veecode.hostname" . }}'
  postgresql:
    enabled: false
  diagnosticMode: 
    enabled: false
  backstage:
    replicas: 1
    command: null
    args: null
    extraEnvVars:
      - name: THEME_FAV_ICON
        value: '{{ .Values.global.theme.favIcon }}'
      - name: THEME_DOWNLOAD_URL
        value: '{{ .Values.global.theme.downloadUrl }}'
      - name: THEME_CUSTOM_JSON
        value: '{{- if .Values.global.theme.customJson -}}{{ .Values.global.theme.customJson | fromJson | toJson }}{{- end -}}'
      - name: THEME_MERGE_JSON
        value: '{{ .Values.global.theme.mergeJson }}'
    podSecurityContext:
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      fsGroupChangePolicy: "OnRootMismatch"
    containerSecurityContext:
      readOnlyRootFilesystem: false
      # readOnlyRootFilesystem=true is more secure, but disables custom theme (will fix this later)
      # readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      seccompProfile:
        type: "RuntimeDefault"
    resources:
      limits:
        cpu: 900m
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
    startupProbe:
      # This gives enough time upon container startup before the liveness and readiness probes are triggered.
      # Giving (120s = initialDelaySeconds + failureThreshold * periodSeconds) to account for the worst case scenario.
      httpGet:
        path: /.backstage/health/v1/liveness
        port: backend
        scheme: HTTP
      initialDelaySeconds: 30
      timeoutSeconds: 4
      periodSeconds: 20
      successThreshold: 1
      failureThreshold: 3
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /.backstage/health/v1/readiness
        port: backend
        scheme: HTTP
      # initialDelaySeconds: 30
      periodSeconds: 10
      successThreshold: 2
      timeoutSeconds: 4
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /.backstage/health/v1/liveness
        port: backend
        scheme: HTTP
      # initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 4
    image:
      pullPolicy: Always
      registry: docker.io
      repository: veecode/devportal
      tag: 1.4.5
    extraVolumes:
      - name: app-config
        configMap:
          name: veecode-devportal-app-config
      #-- Ephemeral volume that will contain the dynamic plugins installed by the initContainer below at start.
      #- name: dynamic-plugins
      #  emptyDir: {}
      # Volume that will expose the `dynamic-plugins.yaml` file from the `dynamic-plugins` config map.
      # The `dynamic-plugins` config map is created by the helm chart from the content of the `global.dynamic` field.
      - name: dynamic-plugins
        configMap:
          defaultMode: 420
          name: veecode-devportal-dynamic-plugins
          optional: true
      # Optional volume that allows exposing the `.npmrc` file (through a `dynamic-plugins-npmrc` secret)
      # to be used when running `npm pack` during the dynamic plugins installation by the initContainer.
      - name: dynamic-plugins-npmrc
        secret:
          defaultMode: 420
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-npmrc" .Release.Name }}'
      # Optional volume that allows adding a container registry `auth.json` file (through a `dynamic-plugins-registry-auth` secret)
      # to be used when installing plugins from secure container registries during the dynamic plugins installation by the initContainer.
      - name: dynamic-plugins-registry-auth
        secret:
          defaultMode: 416
          optional: true
          secretName: '{{ printf "%s-dynamic-plugins-registry-auth" .Release.Name }}'
      - name: npmcacache
        emptyDir: {}
      - name: temp
        emptyDir: {}
    extraVolumeMounts:
      - name: app-config
        mountPath: /app/app-config.local.yaml
        subPath: app-config.yaml
      - name: dynamic-plugins
        mountPath: /app/dynamic-plugins.yaml
        subPath: dynamic-plugins.yaml
      #- name: dynamic-plugins
      #  mountPath: /app/dynamic-plugins
      - name: temp
        mountPath: /tmp
    initContainers: []
    installDir: /app
    appConfig:
      app:
        title: "Devportal Platform"
        baseUrl: '{{- include "veecode.protocol" . }}://{{- include "veecode.hostname" . }}{{- include "veecode.port" . }}'
        branding:
          fullLogo: https://veecode-platform.github.io/support/logos/logo.svg
          fullLogoDark: https://veecode-platform.github.io/support/logos/logo-black.svg
          iconLogo: https://veecode-platform.github.io/support/logos/logo-mobile.png
          theme:
            light:
              primaryColor: '#202020'
              headerColor1: '#45556D'
              headerColor2: '#86F4CE'
              navigationIndicatorColor: '#86F4CE'
            dark:
              primaryColor: '#cdcdcd'
              headerColor1: '#45556D'
              headerColor2: '#86F4CE'
              navigationIndicatorColor: '#86F4CE'
        support: #default veecode support discussions
          url: https://github.com/veecode-platform/support/discussions 
          items: 
            - title: Issues
              icon: github
              links:
                - url: https://github.com/veecode-platform/support/discussions
                  title: GitHub Issues
      backend:
        baseUrl: '{{- include "veecode.protocol" . }}://{{- include "veecode.hostname" . }}{{- include "veecode.port" . }}'
        listen:
          port: 7007
        database:
          client: better-sqlite3
          connection: ':memory:'
          #client: pg
          #pluginDivisionMode: schema
          #connection:
          #  host: host
          #  port: 5432
          #  database: database
          #  user: postgres
          #  password: password
        cors:
          #origin: app base url
          baseUrl: '{{- include "veecode.protocol" . }}://{{- include "veecode.hostname" . }}{{- include "veecode.port" . }}'
          methods: [GET, POST, PUT, DELETE, PATCH]
          credentials: true
        csp:
          connect-src: ["'self'","http:","https:"]
          img-src: ["'self'","data:","https://raw.githubusercontent.com/","https://avatars.githubusercontent.com/","https://veecode-platform.github.io","https://platform.vee.codes"]
          script-src: ["'self'","'unsafe-eval'","https://www.google-analytics.com","https://www.googletagmanager.com"]
        reading:
          allow:
            - host: example.com
            - host: "*.mozilla.org"
      organization:
        name: veecode
      permission:
        enabled: false
        rbac:
          pluginsWithPermission:
            - catalog
            - scaffolder
            - permission
            - kubernetes
            - vee
            - kong
            - veecode-platform-permissions-hub
          admin:
            superUsers:
              - name: user:default/admin
            users:
              - name: group:default/admin
      extensions:
        directory: /app/catalog-entities/extensions
        installation:
          enabled: true
          saveToSingleFile:
            file: /app/extensions-install.yaml
      techdocs:
        builder: "local"
        generator:
          runIn: "local"
        publisher:
          type: "local"                    
      catalog:
        orphanStrategy: "delete"
        rules:
          - allow: ["Component","API","Location","Cluster","Template","Group","User","Environment","Vault","Infracost","Vulnerabilities","Database"]
        providers:
          infracost:
            default: 
              schedule:    
                frequency:
                  minutes: 60
                timeout:
                  minutes: 3
                initialDelay:
                  seconds: 1
      #search: should be enabled using a database
      #  pg:
      #    highlightOptions:
      #      useHighlight: true
      #      maxWord: 35
      #      minWord: 15
      #      shortWord: 3
      #      highlightAll: false
      #      maxFragments: 0
      #      fragmentDelimiter:  ... 
      #    schedule:        
      #      frequency: 
      #        minutes: 3
      #      timeout: 
      #        minutes: 5
      platform:
        signInProviders:
          - "github"
        guest:
          enabled: false
          demo: false
